<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeoffice Tracker</title>

<style>
body {
    font-family: system-ui;
    background:#f2f4f7;
    padding:15px;
}
.container {
    max-width:600px;
    margin:auto;
}
.day {
    background:white;
    padding:10px;
    border-radius:12px;
    margin:8px 0;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.day.disabled {
    opacity:0.5;
}
.header {
    font-weight:bold;
    margin-bottom:5px;
}
.inputs {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:5px;
}
label {
    font-size:11px;
    color:#666;
}
input {
    width:100%;
    padding:5px;
    border-radius:6px;
    border:1px solid #ddd;
}
.summary {
    margin-top:15px;
    background:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
}
.progress {
    background:#ddd;
    height:10px;
    border-radius:5px;
    overflow:hidden;
    margin-top:10px;
}
.bar {
    height:100%;
    background:#4CAF50;
}
.warning {
    margin-top:5px;
    font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
<h2>🏠 Homeoffice</h2>
<input type="month" id="month">

<div id="days"></div>

<div class="summary">
<p>Gesamtstunden: <span id="total">0</span></p>
<p>Homeoffice: <span id="home">0</span></p>
<p><span id="percent">0%</span></p>
<div class="progress"><div class="bar" id="bar"></div></div>
<p class="warning" id="warning"></p>
</div>
</div>

<script>
const daysContainer = document.getElementById("days");
const monthInput = document.getElementById("month");
monthInput.value = new Date().toISOString().slice(0,7);

// Feiertage Bayern (inkl. Ostern Berechnung)
function getEaster(year){
    let f=Math.floor,
    G=year%19,C=f(year/100),H=(C-f(C/4)-f((8*C+13)/25)+19*G+15)%30,
    I=H-f(H/28)*(1-f(29/(H+1))*f((21-G)/11)),
    J=(year+f(year/4)+I+2-C+f(C/4))%7,
    L=I-J,m=3+f((L+40)/44),d=L+28-31*f(m/4);
    return new Date(year,m-1,d);
}

function getHolidays(year){
    let easter=getEaster(year);
    let holidays=[
        new Date(year,0,1),
        new Date(year,4,1),
        new Date(year,9,3),
        new Date(year,11,25),
        new Date(year,11,26),
        new Date(year,7,15), // Mariä Himmelfahrt (teilweise Bayern)
    ];
    holidays.push(new Date(easter.getTime()-2*86400000)); // Karfreitag
    holidays.push(new Date(easter.getTime()+86400000)); // Ostermontag
    holidays.push(new Date(easter.getTime()+39*86400000)); // Christi Himmelfahrt
    holidays.push(new Date(easter.getTime()+50*86400000)); // Pfingstmontag
    return holidays.map(d=>d.toDateString());
}

function load(){
    daysContainer.innerHTML="";
    let [y,m]=monthInput.value.split("-");
    let days=new Date(y,m,0).getDate();
    let holidays=getHolidays(parseInt(y));

    for(let i=1;i<=days;i++){
        let date=new Date(y,m-1,i);
        let isWeekend=date.getDay()==0||date.getDay()==6;
        let isHoliday=holidays.includes(date.toDateString());
        let disabled=isWeekend||isHoliday;

        let key=monthInput.value+"-"+i;
        let data=JSON.parse(localStorage.getItem(key))||{start:"",p1:"",p2:"",end:"",ho:false};

        let div=document.createElement("div");
        div.className="day"+(disabled?" disabled":"");

        div.innerHTML=`
        <div class="header">${date.toLocaleDateString("de-DE",{weekday:"short"})} ${i}</div>
        <div class="inputs">
            <div><label>Start</label><input type="time" value="${data.start}" ${disabled?"disabled":""} onchange="save(${i})"></div>
            <div><label>Pause</label><input type="time" value="${data.p1}" ${disabled?"disabled":""} onchange="save(${i})"></div>
            <div><label>Ende Pause</label><input type="time" value="${data.p2}" ${disabled?"disabled":""} onchange="save(${i})"></div>
            <div><label>Ende</label><input type="time" value="${data.end}" ${disabled?"disabled":""} onchange="save(${i})"></div>
        </div>
        <label><input type="checkbox" ${data.ho?"checked":""} ${disabled?"disabled":""} onchange="save(${i})"> Homeoffice</label>
        `;
        daysContainer.appendChild(div);
    }
    calc();
}

function save(d){
    let row=daysContainer.children[d-1];
    let inputs=row.querySelectorAll("input");

    let data={
        start:inputs[0].value,
        p1:inputs[1].value,
        p2:inputs[2].value,
        end:inputs[3].value,
        ho:inputs[4].checked
    };
    localStorage.setItem(monthInput.value+"-"+d,JSON.stringify(data));
    calc();
}

function calc(){
    let total=0,home=0;

    document.querySelectorAll(".day").forEach(d=>{
        if(d.classList.contains("disabled")) return;

        let i=d.querySelectorAll("input");

        let start=i[0].value, p1=i[1].value, p2=i[2].value, end=i[3].value;
        let ho=i[4].checked;

        if(start && end){
            let s=new Date(`1970-01-01T${start}`);
            let e=new Date(`1970-01-01T${end}`);
            let work=(e-s)/3600000;

            if(p1 && p2){
                let ps=new Date(`1970-01-01T${p1}`);
                let pe=new Date(`1970-01-01T${p2}`);
                work -= (pe-ps)/3600000;
            }

            total+=work;
            if(ho) home+=work;
        }
    });

    let p=total?home/total*100:0;

    total=total.toFixed(1);
    home=home.toFixed(1);

    document.getElementById("total").innerText=total;
    document.getElementById("home").innerText=home;
    document.getElementById("percent").innerText=p.toFixed(1)+"%";
    document.getElementById("bar").style.width=p+"%";

    let w=document.getElementById("warning");
    if(p>50){
        w.innerText="⚠️ Über 50%!";
        w.style.color="red";
    } else {
        w.innerText="OK";
        w.style.color="green";
    }
}

monthInput.onchange=load;
load();
</script>
</body>
</html>
